name: CI/CD Security and Integration Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-test:
    runs-on: ubuntu-latest

    services:
      # Database service for integration tests
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: searchdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Selenium Grid for UI testing
      selenium:
        image: selenium/standalone-chrome:114.0
        ports:
          - 4444:4444

    env:
      DB_HOST: localhost
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: searchdb
      TEST_BASE_URL: http://localhost:8080
      SELENIUM_HOST: http://localhost:4444/wd/hub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./webapp
        run: npm install

      # Q6: ESLint Security Scan
      - name: Run ESLint Security Scan
        working-directory: ./webapp
        run: npm run lint

      # OWASP Dependency Check
      - name: Check scanned files exist
        run: |
          ls -la webapp/package-lock.json || (echo "❌ webapp/package-lock.json not found!" && exit 1)

      - name: Download seeded NVD database from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.owasp-dependency-check
          cd ~/.owasp-dependency-check
          gh release download v1.0-cache \
            -R ict2216-2026-p2-group20/momo-vault \
            -p '*.zip' \
            -D . || echo "Release download failed, continuing without cache"
          unzip -q *.zip || true
          if [ -d .owasp-dependency-check ]; then
            mv .owasp-dependency-check/* ./
            rmdir .owasp-dependency-check
          fi
          rm -f *.zip || true

      - name: Create reports directory
        run: |
          mkdir -p ${{ github.workspace }}/reports
          chmod 777 ${{ github.workspace }}/reports

      - name: Run OWASP Dependency Check
        run: |
          find ~/.owasp-dependency-check/data -name "*.lock.db" -type f -delete || true
          chmod -R 777 ~/.owasp-dependency-check/data || true
          
          docker run --rm \
            -v ~/.owasp-dependency-check/data:/usr/share/dependency-check/data:rw \
            -v ${{ github.workspace }}:/src:rw \
            owasp/dependency-check:latest \
            --scan /src/webapp/package-lock.json \
            --format HTML \
            --out /src/reports \
            --project "Final-Practical-WebApp" \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --failOnCVSS 7 \
            --noupdate \
            --disableNodeAudit \
            --enableExperimental \
            --prettyPrint

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check-report.html

      # Integration and UI Testing
      - name: Run Unit/Integration Tests
        working-directory: ./webapp
        run: npm test

      - name: Start Node.js server
        working-directory: ./webapp
        run: |
          nohup node server.js > server.log 2>&1 &
          sleep 5

      - name: Verify server is running
        run: |
          curl -f http://localhost:8080 || { echo "Server failed to start"; exit 1; }

      - name: Wait for Selenium server to be up
        run: |
          for i in {1..10}; do
            curl -s http://localhost:4444/wd/hub/status && break || sleep 3
          done

      - name: Run Selenium UI Tests
        working-directory: ./webapp
        run: node tests/SeleniumTest.mjs
